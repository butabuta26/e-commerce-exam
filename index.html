<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gadgetize</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="icon" type="image/x-icon" href="images/link-logo-removebg-preview.png">
    <link rel="stylesheet" href="styles/style.css">
    
</head>
<body>
    <!-- !custom loading screen -->
    <div id="loader">
        <div class="spinner"></div>
    </div>
    <section class="intoductory-section pb-4">
      <!-- !welcome line and header section -->
      <div class="container-fluid" id="header-container">
          <!-- welcome line -->
      </div>
      <div class="container hero-section">
        <div class="row px-5">
          <div class="container my-4">
            <div class="row g-3">
          
              <div class="col-lg-8">
                <div class="home-box">
                  <div class="home-text">
                    <h5>NEW ARRIVALS</h5>
                    <h1><span class="text-warning">4K</span> LCD</h1>
                    <h2>Quantum Vision LCD</h2>
                    <p>Limited Time: Online Only!</p>
                    <button class="btn btn-light">Shop Now</button>
                  </div>

                  <img src="./images/TV.png" alt="" class="main-home-img">
                </div>
              </div>
          
              <div class="col-lg-4 d-flex flex-column gap-3">
          
                <div class="small-box">
                  <div class="small-text">
                    <h6>Mobile</h6>
                    <h5>Nexus Mobile Pro 256GB</h5>
                    <p>Limited Time: Online Only!</p>
                  </div>
                  <img src="" alt="">
                </div>
          
                <div class="small-box">
                  <div class="small-text">
                    <h6>iPadMini</h6>
                    <h5>10 Inch iPad Mini Pro</h5>
                    <p>Limited Time: Online Only!</p>
                  </div>
                  <img src="" alt="">
                </div>
          
              </div>
          
            </div>
          </div>
        </div>
      </div>
    </section>
    
    <section class="categories-section py-4">
      <div class="container">
          <div id="category-row" class="d-flex gap-4 overflow-auto">
              <!-- injected from JSON -->
          </div>
      </div>
  </section>
    
    <!-- !async modal window -->
    <div class="modal fade" id="newsletterModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content p-4 text-center">
    
          <div class="text-end">
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>
    

          <h6>SIGN UP FOR OUR NEWSLETTER & PROMOTIONS!</h6>
          <h1 class="fw-bold">OUR NEWSLETTER</h1>
          <p>ON YOUR NEXT PURCHASE</p>
    
          <input type="email" class="form-control my-3" placeholder="Your email address...">
    
          <button class="btn btn-dark w-100">SUBSCRIBE</button>
    
          <div class="mt-3">
            <input type="checkbox" id="dontShow">
            <label for="dontShow">Don't show this popup again</label>
          </div>
    
        </div>
      </div>
    </div>


    <script src="scripts/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
